# /etc/nginx/sites-available/touhou-game
# Static site config for Crimson Shrine ~ Danmaku Vespers
# Replace `server_name` with your domain or VPS IP.

server {
    listen 80;
    listen [::]:80;
    server_name _;   # <-- replace with your domain, e.g. shrine.example.com

    root /var/www/touhou-game;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # cache JS/CSS aggressively since filenames don't change on redeploy
    location ~* \.(?:js|css)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript text/html;
}
